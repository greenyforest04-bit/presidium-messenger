# Presidium Messenger — cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-linux-android",
    "aarch64-apple-ios",
    "x86_64-apple-darwin",
]

[advisories]
severity-threshold = "medium"
yanked = "deny"
# unmaintained = "warn"  # optional: warn on unmaintained crates

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
]
# Unlicensed crates are denied by default when not in allow list.
# Copyleft licenses (AGPL, LGPL, GPL, MPL) are denied by default
# because they are not listed above in `allow`.

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
