# Presidium Messenger — Cargo configuration
# See: https://doc.rust-lang.org/cargo/reference/config.html

[build]
# Use all available cores for parallel compilation
jobs = -1

[target.aarch64-linux-android]
linker = "aarch64-linux-android-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi-clang"

[alias]
# Convenience aliases for common operations
check-all = "check --workspace"
test-all = "test --workspace"
clippy-all = "clippy --workspace -- -D warnings"
fmt-all = "fmt --all -- --check"
doc-all = "doc --workspace --no-deps"

[net]
# Use gitoxide for faster git operations
git-fetch-with-cli = true
